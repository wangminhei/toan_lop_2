<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Toán Lớp 2</title>
    <style>
        :root {
            --bg-color: #E1F5FE; /* Xanh nhạt thư giãn */
            --primary: #FF9800; /* Cam tươi */
            --secondary: #4CAF50; /* Xanh lá */
            --accent: #9C27B0; /* Tím nhạt */
            --danger: #FF5252; /* Đỏ */
            --text: #333;
        }
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: var(--bg-color); 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            color: var(--text);
            user-select: none;
        }
        .screen { 
            display: none; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .screen.active { 
            display: flex; 
        }
        h1 { 
            color: var(--accent); 
            font-size: 2.8rem; 
            text-shadow: 2px 2px #fff; 
            margin-bottom: 10px;
        }
        input { 
            font-size: 1.5rem; 
            padding: 12px; 
            border-radius: 15px; 
            border: 3px solid var(--primary); 
            text-align: center; 
            width: 80%; 
            max-width: 300px; 
            margin: 15px 0;
            outline: none;
        }
        input:focus {
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
        }
        .avatars { 
            display: flex; 
            gap: 15px; 
            margin: 20px 0; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .avatar { 
            font-size: 3.5rem; 
            cursor: pointer; 
            border: 4px solid transparent; 
            border-radius: 50%; 
            padding: 5px; 
            transition: 0.2s; 
            background: rgba(255,255,255,0.5);
        }
        .avatar.selected { 
            border-color: var(--primary); 
            background: #fff; 
            transform: scale(1.15); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        button { 
            font-size: 1.6rem; 
            padding: 15px 35px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #E65100; 
            transition: transform 0.1s, box-shadow 0.1s; 
            margin-top: 20px; 
            font-family: inherit; 
            font-weight: bold; 
        }
        button:active { 
            transform: translateY(6px); 
            box-shadow: none; 
        }
        .question-box { 
            background: white; 
            border-radius: 25px; 
            padding: 30px 20px; 
            margin: 20px 0; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 95%; 
            max-width: 500px; 
        }
        .question { 
            font-size: 4rem; 
            color: var(--accent); 
            margin: 25px 0; 
            font-weight: bold; 
        }
        .options { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .option { 
            background-color: var(--secondary); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 90px; 
            font-size: 2.2rem; 
            border-radius: 20px; 
            box-shadow: 0 6px 0 #388E3C; 
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .option:active { 
            transform: translateY(6px); 
            box-shadow: none; 
        }
        .timer-bar { 
            width: 100%; 
            height: 20px; 
            background: #EEEEEE; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .timer-fill { 
            height: 100%; 
            background: var(--primary); 
            width: 100%; 
            transition: width 1s linear; 
        }
        .message-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .message-box { 
            font-size: 2rem; 
            color: #FFF; 
            background: var(--secondary); 
            padding: 20px 40px; 
            border-radius: 25px; 
            animation: popIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            font-weight: bold;
        }
        /* Confetti Effect */
        .confetti { 
            position: fixed; 
            width: 12px; 
            height: 12px; 
            z-index: 999; 
            animation: fall linear forwards; 
            border-radius: 3px;
        }
        @keyframes fall { 
            to { transform: translateY(105vh) rotate(720deg); } 
        }
        @keyframes popIn { 
            0% { transform: scale(0.5); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 500px; 
            align-items: center; 
            font-size: 1.4rem; 
            font-weight: bold; 
        }
        .level-text, .score-text { 
            background: white; 
            padding: 8px 15px; 
            border-radius: 20px; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.1); 
            color: var(--accent);
        }
        .score-text { color: var(--primary); }
        .author-info {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 1rem;
            color: #666;
            font-weight: bold;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Popup Message -->
    <div id="msg-overlay" class="message-overlay">
        <div id="msg-box" class="message-box"></div>
    </div>

    <!-- Màn Hình Bắt Đầu -->
    <div id="start-screen" class="screen active">
        <h1>Toán Vui Lớp 2 🎈</h1>
        <p style="font-size: 1.2rem; color: #666; margin-top:0;">Cùng làm toán để nhận sao nhé!</p>
        
        <input type="text" id="player-name" placeholder="Tên của bé là gì?" autocomplete="off" />
        
        <h3 style="color: var(--secondary); margin-bottom: 5px;">Chọn bạn đồng hành:</h3>
        <div class="avatars" id="avatar-container">
            <span class="avatar selected">🐱</span>
            <span class="avatar">🐶</span>
            <span class="avatar">🐻</span>
            <span class="avatar">🐰</span>
            <span class="avatar">🐼</span>
            <span class="avatar">🦖</span>
        </div>
        
        <button onclick="startGame()">Bắt Đầu Học 🚀</button>
    </div>

    <!-- Màn Hình Chơi -->
    <div id="game-screen" class="screen">
        <div class="header">
            <div class="level-text">Câu: <span id="current-q">1</span>/10</div>
            <div id="player-info">🐱 Bé <span id="display-name"></span></div>
            <div class="score-text">⭐ <span id="score">0</span></div>
        </div>
        
        <div class="question-box">
            <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
            <div class="question" id="question-text">25 + 14 = ?</div>
            
            <div class="options" id="options-container">
                <!-- Đáp án sẽ được sinh ra ở đây -->
            </div>
        </div>
    </div>

    <!-- Màn Hình Kết Quả -->
    <div id="result-screen" class="screen">
        <h1 id="result-title">Hoàn Thành Xuất Sắc!</h1>
        <div style="font-size: 6rem; margin: 10px 0;">🏆</div>
        <h2 style="font-size: 2.5rem; color: var(--primary);">Điểm của bé: <span id="final-score">0</span></h2>
        <h3 style="font-size: 1.8rem; color: var(--secondary); margin-top: -10px;">Số câu đúng: <span id="correct-count">0</span>/10</h3>
        
        <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
            <button onclick="resetGame()" style="background: var(--secondary); box-shadow: 0 6px 0 #2E7D32;">Làm Lại 🔄</button>
            <button onclick="goHome()" style="background: var(--accent); box-shadow: 0 6px 0 #7B1FA2;">Về Đầu Trang 🏠</button>
        </div>
    </div>

    <!-- Thông tin Tác Giả -->
    <div class="author-info">
        Made with 🧡 by WangMinHei
    </div>

    <script>
        const THEME_COLORS = ['#FF9800', '#4CAF50', '#03A9F4', '#E91E63']; 
        const LABELS = ['A', 'B', 'C', 'D'];
        
        let state = {
            name: '',
            avatar: '🐱',
            score: 0,
            correct: 0,
            qIndex: 0,
            streak: 0,
            timer: null,
            timeLeft: 30,
            currentAnswer: null,
            isAnswering: false
        };

        // Gắn sự kiện chọn avatar
        document.querySelectorAll('.avatar').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.avatar').forEach(a => a.classList.remove('selected'));
                this.classList.add('selected');
                state.avatar = this.innerText;
            });
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showPopup(text, type = 'success') {
            const overlay = document.getElementById('msg-overlay');
            const box = document.getElementById('msg-box');
            
            box.innerText = text;
            if (type === 'success') {
                box.style.backgroundColor = 'var(--secondary)';
                box.style.color = '#fff';
            } else if (type === 'error') {
                box.style.backgroundColor = '#FF9800'; // Dùng màu cam cho nhẹ nhàng thay vì đỏ
                box.style.color = '#fff';
            } else {
                box.style.backgroundColor = 'var(--danger)';
            }
            
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 2000);
        }

        function startGame() {
            const nameInput = document.getElementById('player-name').value;
            state.name = nameInput.trim() || 'Bé Ngoan';
            document.getElementById('display-name').innerText = state.name.substring(0, 10); // Giới hạn độ dài tên
            document.getElementById('player-info').innerHTML = `${state.avatar} ${state.name}`;
            
            state.score = 0;
            state.correct = 0;
            state.qIndex = 0;
            state.streak = 0;
            document.getElementById('score').innerText = state.score;
            
            showScreen('game-screen');
            nextQuestion();
        }

        // Tạo số ngẫu nhiên từ min đến max (bao gồm cả max)
        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateQuestion() {
            const types = ['add', 'sub', 'mul', 'div', 'compare'];
            const type = types[Math.floor(Math.random() * types.length)];
            let qText = '';
            let answer = '';
            let wrongOptions = [];

            if (type === 'add') {
                const a = rand(1, 89);
                const b = rand(1, 99 - a);
                qText = `${a} + ${b} = ?`;
                answer = a + b;
            } else if (type === 'sub') {
                const a = rand(20, 99);
                const b = rand(1, a - 1);
                qText = `${a} - ${b} = ?`;
                answer = a - b;
            } else if (type === 'mul') {
                const a = rand(2, 9);
                const b = rand(2, 9);
                qText = `${a} × ${b} = ?`;
                answer = a * b;
            } else if (type === 'div') {
                const b = rand(2, 9);
                const ans = rand(2, 9);
                const a = b * ans;
                qText = `${a} ÷ ${b} = ?`;
                answer = ans;
            } else if (type === 'compare') {
                const a = rand(10, 99);
                const b = rand(10, 99);
                qText = `${a} ... ${b}`;
                answer = a > b ? '>' : (a < b ? '<' : '=');
                wrongOptions = ['>', '<', '='].filter(x => x !== answer);
            }

            // Tạo các đáp án sai cho dạng tính toán
            if (type !== 'compare') {
                while(wrongOptions.length < 3) {
                    let offset = rand(-10, 10);
                    if(offset === 0) offset = 2;
                    let w = answer + offset;
                    if (w < 0) w = Math.abs(w) + 1;
                    if (!wrongOptions.includes(w) && w !== answer) {
                        wrongOptions.push(w);
                    }
                }
            }

            let allOptions = [answer, ...wrongOptions];
            
            // Xáo trộn đáp án
            if (type === 'compare') {
                allOptions = ['>', '<', '=']; 
                allOptions.push('?'); // Thêm 1 đáp án nhiễu cho đủ 4 nút
            } else {
                allOptions.sort(() => Math.random() - 0.5);
            }

            return { text: qText, answer: answer, options: allOptions };
        }

        function nextQuestion() {
            if (state.qIndex >= 10) {
                endGame();
                return;
            }
            state.isAnswering = false;
            state.qIndex++;
            document.getElementById('current-q').innerText = state.qIndex;
            
            const q = generateQuestion();
            state.currentAnswer = q.answer;
            document.getElementById('question-text').innerText = q.text;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                // Đổi màu xen kẽ cho sinh động
                btn.style.backgroundColor = THEME_COLORS[i % THEME_COLORS.length];
                btn.style.boxShadow = `0 6px 0 rgb(0,0,0,0.2)`;
                
                btn.innerHTML = `<b>${LABELS[i]}.</b> &nbsp; ${opt}`;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            state.timeLeft = 30;
            const fill = document.getElementById('timer-fill');
            fill.style.transition = 'none';
            fill.style.width = '100%';
            
            // Ép reflow để reset animation
            void fill.offsetWidth; 
            
            fill.style.transition = 'width 30s linear';
            fill.style.width = '0%';

            state.timer = setInterval(() => {
                state.timeLeft--;
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    if (!state.isAnswering) {
                        state.isAnswering = true;
                        showPopup("Hết thời gian! ⏰", "timeout");
                        state.streak = 0;
                        disableButtons();
                        setTimeout(nextQuestion, 2000);
                    }
                }
            }, 1000);
        }

        function disableButtons() {
            document.querySelectorAll('.option').forEach(btn => btn.style.pointerEvents = 'none');
        }

        function checkAnswer(selected, btnElement) {
            if (state.isAnswering) return;
            state.isAnswering = true;
            clearInterval(state.timer);
            disableButtons();

            if (selected === state.currentAnswer) {
                state.score += 10;
                state.correct++;
                state.streak++;
                document.getElementById('score').innerText = state.score;
                
                // Hiệu ứng đúng
                btnElement.style.transform = 'scale(1.1)';
                createConfetti();
                
                if (state.streak >= 3) {
                    showPopup("Bé đang làm rất tốt! 🌟🌟🌟", "success");
                } else {
                    showPopup("Hoan hô, đúng rồi! 🎉", "success");
                }
            } else {
                state.streak = 0;
                // Hiệu ứng sai
                btnElement.style.opacity = '0.5';
                showPopup("Gần đúng rồi, thử lại nhé! 💙", "error");
            }
            
            setTimeout(nextQuestion, 2000);
        }

        function createConfetti() {
            const colors = ['#FF4081', '#E040FB', '#7C4DFF', '#536DFE', '#448AFF', '#40C4FF', '#18FFFF', '#64FFDA', '#69F0AE', '#B2FF59', '#EEFF41', '#FFFF00', '#FFD740', '#FFAB40', '#FF6E40'];
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Randomize size and duration
                const size = Math.random() * 8 + 8; // 8px - 16px
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                confetti.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function endGame() {
            clearInterval(state.timer);
            showScreen('result-screen');
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('correct-count').innerText = state.correct;
            
            const title = document.getElementById('result-title');
            if (state.correct === 10) {
                title.innerText = "Tuyệt Vời! Điểm Tuyệt Đối! 🌟";
                createConfetti();
                setTimeout(createConfetti, 1000);
            } else if (state.correct >= 7) {
                title.innerText = "Giỏi Lắm! Hoàn Thành Tốt! 👏";
                createConfetti();
            } else if (state.correct >= 4) {
                title.innerText = "Cố Gắng Lên Nào! 💪";
            } else {
                title.innerText = "Luyện Tập Thêm Nhé! 📚";
            }
        }

        function resetGame() {
            state.score = 0;
            state.correct = 0;
            state.qIndex = 0;
            state.streak = 0;
            startGame();
        }

        function goHome() {
            showScreen('start-screen');
        }
    </script>
</body>
</html>
